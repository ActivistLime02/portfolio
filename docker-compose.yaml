---
services:
  rocket:
    container_name: portfolio-site
    build:
      context: .
    restart: unless-stopped
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    container_name: portfolio-proxy
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
    depends_on:
      - rocket
